<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDU.i — Login</title>
  <meta name="description" content="Login to EDU.i — AI-powered smart campus platform. Access your Student, Teacher, or Admin dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Animated BG -->
  <div class="login-bg">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>
    <div class="login-grid-pattern"></div>
  </div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px">
          <div class="login-brand-icon"><span class="material-icons-round">hub</span></div>
          <span class="login-brand-text">EDU<span class="login-brand-accent">.i</span></span>
        </a>
      </div>
      <p class="login-tagline">Sign in to your Smart Campus dashboard</p>

      <!-- Role Tabs -->
      <div class="role-tabs" id="roleTabs">
        <button class="role-tab tab-student active" data-role="student" id="tab-student">
          <span class="material-icons-round">school</span>Student
        </button>
        <button class="role-tab tab-teacher" data-role="teacher" id="tab-teacher">
          <span class="material-icons-round">person</span>Teacher
        </button>
        <button class="role-tab tab-admin" data-role="admin" id="tab-admin">
          <span class="material-icons-round">admin_panel_settings</span>Admin
        </button>
      </div>

      <!-- Message -->
      <div class="login-message" id="loginMessage">
        <span class="material-icons-round" id="msgIcon">error</span>
        <span id="msgText"></span>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Enter your username" required autofocus />
            <span class="material-icons-round">person</span>
          </div>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" required />
            <span class="material-icons-round">lock</span>
            <button type="button" class="toggle-password" id="togglePassword">
              <span class="material-icons-round">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-extras">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="material-icons-round">login</span>
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- Credentials Hint -->
      <div class="credentials-hint">
        <div class="credentials-hint-title">
          <span class="material-icons-round">info</span>Demo Credentials
        </div>
        <div class="hint-row">
          <span class="hint-role"><span class="material-icons-round">school</span>Student</span>
          <span class="hint-cred">student / student123</span>
        </div>
        <div class="hint-row">
          <span class="hint-role"><span class="material-icons-round">person</span>Teacher</span>
          <span class="hint-cred">teacher / teacher123</span>
        </div>
        <div class="hint-row">
          <span class="hint-role"><span class="material-icons-round">admin_panel_settings</span>Admin</span>
          <span class="hint-cred">admin / admin123</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <a href="index.html">
        <span class="material-icons-round">arrow_back</span>
        Back to Home
      </a>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    /* ========================================
       Login Page Logic
       ======================================== */

    // If already logged in, redirect to appropriate dashboard
    (function() {
      const session = AUTH.getSession();
      if (session) {
        const redirectMap = { student: 'student.html', teacher: 'teacher.html', admin: 'admin.html' };
        if (redirectMap[session.role]) {
          window.location.href = redirectMap[session.role];
        }
      }
    })();

    // DOM refs
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginMessage = document.getElementById('loginMessage');
    const msgIcon = document.getElementById('msgIcon');
    const msgText = document.getElementById('msgText');
    const togglePassword = document.getElementById('togglePassword');
    const roleTabs = document.querySelectorAll('.role-tab');

    let selectedRole = 'student';

    // Role Tab Switching
    roleTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        roleTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedRole = tab.dataset.role;

        // Auto-fill hint
        const creds = {
          student: { user: 'student', pass: 'student123' },
          teacher: { user: 'teacher', pass: 'teacher123' },
          admin:   { user: 'admin',   pass: 'admin123' }
        };
        usernameInput.value = creds[selectedRole].user;
        passwordInput.value = creds[selectedRole].pass;
        hideMessage();
      });
    });

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.querySelector('.material-icons-round').textContent =
        type === 'password' ? 'visibility' : 'visibility_off';
    });

    // Show Message
    function showMessage(text, type) {
      loginMessage.className = 'login-message ' + type;
      msgIcon.textContent = type === 'error' ? 'error' : 'check_circle';
      msgText.textContent = text;
      loginMessage.style.display = 'flex';
    }
    function hideMessage() {
      loginMessage.style.display = 'none';
    }

    // Form Submission
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      hideMessage();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        showMessage('Please enter both username and password.', 'error');
        return;
      }

      // Add loading state
      loginBtn.classList.add('loading');

      // Simulate a brief delay for UX
      setTimeout(() => {
        const result = AUTH.login(username, password);

        if (result.success) {
          showMessage(`Welcome, ${result.user.name}! Redirecting…`, 'success');
          
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 800);
        } else {
          loginBtn.classList.remove('loading');
          showMessage(result.error, 'error');

          // Shake animation
          loginBtn.style.animation = 'shake .4s ease';
          setTimeout(() => { loginBtn.style.animation = ''; }, 400);
        }
      }, 600);
    });

    // Shake keyframe (injected dynamically)
    const style = document.createElement('style');
    style.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`;
    document.head.appendChild(style);

    // Auto-select role from URL query param (e.g. ?role=teacher)
    (function() {
      const params = new URLSearchParams(window.location.search);
      const roleParam = params.get('role');
      const validRoles = ['student', 'teacher', 'admin'];
      const role = validRoles.includes(roleParam) ? roleParam : 'student';

      // Click the matching tab to trigger auto-fill
      const targetTab = document.getElementById('tab-' + role);
      if (targetTab) targetTab.click();
    })();
  </script>

</body>
</html>
